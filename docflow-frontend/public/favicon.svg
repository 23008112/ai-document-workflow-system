<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a6e;stop-opacity:1" />
    </linearGradient>

    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8c4f0;stop-opacity:1" />
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000040"/>
    </filter>

    <!-- Clip circle -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="180"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#ffffff18" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#ffffff10" stroke-width="1"/>

  <!-- Subtle background pattern dots -->
  <g fill="#ffffff08" clip-path="url(#circleClip)">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="120" cy="60" r="2"/>
    <circle cx="160" cy="80" r="2.5"/>
    <circle cx="320" cy="80" r="3"/>
    <circle cx="280" cy="60" r="2"/>
    <circle cx="340" cy="120" r="2"/>
    <circle cx="60" cy="320" r="2.5"/>
    <circle cx="100" cy="340" r="2"/>
    <circle cx="340" cy="320" r="3"/>
    <circle cx="300" cy="340" r="2"/>
  </g>

  <!-- ── MAIN ICON: Document with flow arrows ── -->

  <!-- Document shape -->
  <g filter="url(#glow)">
    <!-- Main document -->
    <rect x="130" y="105" width="90" height="115" rx="8" ry="8"
          fill="url(#iconGrad)" opacity="0.95"/>

    <!-- Document fold corner -->
    <polygon points="196,105 220,105 220,129" fill="#1a3a6e" opacity="0.6"/>
    <polygon points="196,105 220,129 196,129" fill="#a8c4f0" opacity="0.7"/>

    <!-- Document lines -->
    <rect x="143" y="138" width="55" height="4" rx="2" fill="#1a3a6e" opacity="0.4"/>
    <rect x="143" y="150" width="62" height="4" rx="2" fill="#1a3a6e" opacity="0.4"/>
    <rect x="143" y="162" width="48" height="4" rx="2" fill="#1a3a6e" opacity="0.4"/>
    <rect x="143" y="174" width="58" height="4" rx="2" fill="#1a3a6e" opacity="0.3"/>
    <rect x="143" y="186" width="42" height="4" rx="2" fill="#1a3a6e" opacity="0.3"/>
  </g>

  <!-- ── FLOW ARROWS going right ── -->
  <!-- Arrow 1 -->
  <g filter="url(#glow)" opacity="0.9">
    <line x1="232" y1="155" x2="258" y2="155" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="258,150 268,155 258,160" fill="#4a90d9"/>
  </g>

  <!-- Arrow 2 -->
  <g filter="url(#glow)" opacity="0.7">
    <line x1="232" y1="175" x2="252" y2="175" stroke="#4a90d9" stroke-width="2" stroke-linecap="round"/>
    <polygon points="252,171 260,175 252,179" fill="#4a90d9"/>
  </g>

  <!-- Arrow 3 -->
  <g filter="url(#glow)" opacity="0.5">
    <line x1="232" y1="195" x2="248" y2="195" stroke="#4a90d9" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="248,192 255,195 248,198" fill="#4a90d9"/>
  </g>

  <!-- ── DECISION DIAMOND ── -->
  <g filter="url(#glow)">
    <polygon points="290,140 320,170 290,200 260,170"
             fill="none" stroke="url(#accentGrad)" stroke-width="3"
             stroke-linejoin="round"/>
    <!-- Checkmark inside diamond -->
    <polyline points="278,170 287,180 304,158"
              fill="none" stroke="#ffffff" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── APPROVE / REJECT indicators ── -->
  <!-- Approve dot -->
  <circle cx="290" cy="218" r="8" fill="#22c55e" opacity="0.9" filter="url(#glow)"/>
  <text x="290" y="223" text-anchor="middle" font-family="Arial" font-size="10"
        font-weight="bold" fill="white">✓</text>

  <!-- Reject dot -->
  <circle cx="315" cy="218" r="8" fill="#f87171" opacity="0.9" filter="url(#glow)"/>
  <line x1="311" y1="214" x2="319" y2="222" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="319" y1="214" x2="311" y2="222" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- ── AUDIT LOG lines at bottom of icon ── -->
  <g opacity="0.6">
    <rect x="145" y="240" width="110" height="3" rx="1.5" fill="url(#accentGrad)"/>
    <rect x="155" y="248" width="90" height="2.5" rx="1.25" fill="#4a90d9" opacity="0.7"/>
    <rect x="165" y="255" width="70" height="2" rx="1" fill="#4a90d9" opacity="0.5"/>
  </g>

  <!-- ── TEXT ── -->
  <!-- Main name -->
  <text x="200" y="300" text-anchor="middle"
        font-family="Arial Black, Arial" font-size="36"
        font-weight="900" letter-spacing="2"
        fill="#ffffff" filter="url(#glow)">DocFlow</text>

  <!-- Tagline -->
  <text x="200" y="322" text-anchor="middle"
        font-family="Arial" font-size="11"
        font-weight="400" letter-spacing="3.5"
        fill="#4a90d9" opacity="0.9">END-TO-END WORKFLOW</text>

  <!-- Thin separator line -->
  <line x1="130" y1="332" x2="270" y2="332"
        stroke="url(#accentGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Sub tagline -->
  <text x="200" y="348" text-anchor="middle"
        font-family="Arial" font-size="9"
        font-weight="300" letter-spacing="2"
        fill="#ffffff" opacity="0.5">AUTOMATION SYSTEM</text>

</svg>